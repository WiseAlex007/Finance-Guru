name: "Coordinate Multi-Agent Work"
description: "Coordinate multi-specialist Finance Guru workstreams from the orchestrator."
version: "1.0.0"
category: "orchestration"
module: "fin-guru"
author: "{user_name}"

purpose: |
  Provide a canonical workflow for orchestrating multi-agent Finance Guru work.
  This workflow keeps specialist handoffs explicit, preserves temporal context,
  and ensures downstream artifacts stay aligned with the research -> quant ->
  strategy -> artifacts pipeline.

inputs:
  coordination_goal:
    type: "string"
    required: false
    description: "The user goal that requires coordination across multiple specialists; infer from the active request when not passed explicitly."
  current_datetime:
    type: "string"
    required: false
  current_date:
    type: "string"
    required: false

steps:
  - id: "scope-request"
    name: "Scope Coordinated Work"
    type: "instruction"
    instructions:
      - "Clarify the goal, time horizon, deliverables, and risk constraints."
      - "Decide which specialists are actually required."
      - "Prefer the lightest-weight path that still satisfies the request."

  - id: "plan-handoffs"
    name: "Plan Specialist Sequence"
    type: "instruction"
    instructions:
      - "Use the canonical router workflow for each specialist handoff."
      - "Preserve {current_datetime} and {current_date} in every handoff."
      - "Default to research -> quant -> strategy -> artifacts unless the request only needs a subset."

  - id: "track-artifacts"
    name: "Track Outputs And Dependencies"
    type: "instruction"
    instructions:
      - "Record which specialist owns each output."
      - "Track dependencies between research notes, quant outputs, strategy recommendations, and generated documents."
      - "For buy tickets, preserve the canonical ticket contract and storage location under fin-guru-private/fin-guru/tickets/."

  - id: "coordinate-complete"
    name: "Coordination Complete"
    type: "success"
    message: "Multi-agent coordination workflow is ready for orchestrator execution."
