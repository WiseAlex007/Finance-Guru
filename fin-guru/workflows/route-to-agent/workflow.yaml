name: "Route To Agent"
description: "Canonical router from the Finance Orchestrator to specialist command agents."
version: "1.0.0"
category: "routing"
module: "fin-guru"
author: "{user_name}"

purpose: |
  Resolve a specialist command from the Finance Orchestrator to the canonical
  agent definition stored under `.claude/commands/fin-guru/agents/`. This
  workflow keeps specialist routing consistent across orchestrator references,
  mirrored agent files, and downstream documentation.

inputs:
  target_agent:
    type: "string"
    required: true
    description: "Agent identifier supplied by the orchestrator menu item data field."
    allowed_values:
      - market-researcher
      - quant-analyst
      - strategy-advisor
      - compliance-officer
      - margin-specialist
      - dividend-specialist
      - teaching-specialist
      - builder
      - qa-advisor
  current_datetime:
    type: "string"
    required: false
    description: "Current full datetime already established by the orchestrator."
  current_date:
    type: "string"
    required: false
    description: "Current structured date already established by the orchestrator."

steps:
  - id: "validate-target-agent"
    name: "Validate Requested Specialist"
    type: "validation"
    description: "Reject unknown routing targets before attempting a handoff."
    checks:
      - condition: "{target_agent} is one of allowed_values"
        message: "Requested specialist is supported by Finance Guru routing."

  - id: "resolve-agent-path"
    name: "Resolve Canonical Agent Path"
    type: "mapping"
    description: "Map the requested specialist to the canonical command agent file."
    output: "canonical_agent_path"
    map:
      market-researcher: "{project-root}/.claude/commands/fin-guru/agents/market-researcher.md"
      quant-analyst: "{project-root}/.claude/commands/fin-guru/agents/quant-analyst.md"
      strategy-advisor: "{project-root}/.claude/commands/fin-guru/agents/strategy-advisor.md"
      compliance-officer: "{project-root}/.claude/commands/fin-guru/agents/compliance-officer.md"
      margin-specialist: "{project-root}/.claude/commands/fin-guru/agents/margin-specialist.md"
      dividend-specialist: "{project-root}/.claude/commands/fin-guru/agents/dividend-specialist.md"
      teaching-specialist: "{project-root}/.claude/commands/fin-guru/agents/teaching-specialist.md"
      builder: "{project-root}/.claude/commands/fin-guru/agents/builder.md"
      qa-advisor: "{project-root}/.claude/commands/fin-guru/agents/qa-advisor.md"

  - id: "verify-agent-file"
    name: "Verify Canonical Agent File Exists"
    type: "validation"
    description: "Ensure routing never points at a missing specialist definition."
    checks:
      - condition: "file_exists({canonical_agent_path})"
        message: "Canonical agent definition is present and can be loaded."

  - id: "prepare-handoff"
    name: "Prepare Specialist Handoff"
    type: "instruction"
    description: "Carry orchestrator session context into the routed specialist."
    instructions:
      - "Load {canonical_agent_path} as the source-of-truth specialist definition."
      - "Pass {current_datetime} and {current_date} into the specialist session."
      - "Retain orchestrator-scoped system context, user name, and communication language."
      - "If the specialist supports buy-ticket generation, preserve the canonical buy-ticket contract (YAML frontmatter plus Execution Summary, saved under fin-guru-private/fin-guru/tickets/)."

  - id: "route-complete"
    name: "Routing Complete"
    type: "success"
    description: "The orchestrator can now continue with the requested specialist."
    message: "Specialist routing resolved to canonical command agent definition."

outputs:
  - name: "canonical_agent_path"
    type: "string"
    description: "Resolved path to the canonical specialist definition."

metadata:
  workflow_type: "router"
  source_of_truth: "{project-root}/.claude/commands/fin-guru/agents/"
  mirrors:
    - "{project-root}/fin-guru/agents/"
    - "{project-root}/.claude/agents/"
