name: "Audit Session Trail"
description: "Audit Finance Guru compliance, risk, and artifact integrity for the current session."
version: "1.0.0"
category: "audit"
module: "fin-guru"
author: "{user_name}"

purpose: |
  Provide a canonical workflow for reviewing session outputs for compliance,
  risk framing, and workflow integrity. This keeps buy-ticket audits,
  disclaimers, and specialist handoffs consistent with Finance Guru policy.

inputs:
  audit_scope:
    type: "string"
    required: false
    description: "The set of outputs or decisions being audited; infer from the active session when not passed explicitly."
  current_datetime:
    type: "string"
    required: false
  current_date:
    type: "string"
    required: false

steps:
  - id: "collect-artifacts"
    name: "Collect Session Outputs"
    type: "instruction"
    instructions:
      - "Gather the relevant research, quant, strategy, and artifact outputs for the requested scope."
      - "Identify any generated buy tickets, analysis documents, or compliance notes."

  - id: "validate-policy"
    name: "Validate Compliance And Risk Policy"
    type: "instruction"
    instructions:
      - "Confirm educational-only disclaimer language is present where required."
      - "Confirm risk disclosures and sources/assumptions are present."
      - "For buy tickets, confirm the canonical contract: YAML frontmatter, Execution Summary, risk notes, and tickets path."

  - id: "review-overlays"
    name: "Review Advisory Overlays"
    type: "instruction"
    instructions:
      - "Check whether ITC or other advisory overlays were included appropriately."
      - "Ensure advisory overlays are clearly non-blocking and not presented as hard gates."

  - id: "audit-complete"
    name: "Audit Complete"
    type: "success"
    message: "Audit workflow is ready for orchestrator execution."
