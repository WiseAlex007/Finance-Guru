name: Error to Issue

on:
  workflow_run:
    workflows: [CI, Quality Gates, Release]
    types: [completed]

permissions:
  issues: write
  actions: read

jobs:
  create-issue:
    name: Create GitHub issue from workflow failure
    if: github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Create failure issue (error pipeline → insight)
        uses: actions/github-script@v9
        with:
          script: |
            const run = context.payload.workflow_run;
            const title = `[CI failure] ${run.name} — ${run.head_branch}@${run.head_sha.slice(0,7)}`;
            const body = [
              `## Workflow failed on main`,
              '',
              `- **Workflow:** ${run.name}`,
              `- **Branch:** ${run.head_branch}`,
              `- **Commit:** ${run.head_sha}`,
              `- **Run:** ${run.html_url}`,
              `- **Actor:** @${run.actor.login}`,
              '',
              'This issue was auto-filed by \`.github/workflows/error-to-issue.yml\`.',
              'It maps the error signal from CI to a trackable insight — the error-to-insight pipeline.',
              '',
              '## Action items',
              '',
              '- [ ] Triage the root cause',
              '- [ ] Decide: fix forward or rollback (\`.github/workflows/rollback.yml\`)',
              '- [ ] Close this issue once resolved and link the fix PR',
            ].join('\n');

            // De-dupe: don't create a new issue if one exists for the same commit
            const { data: existing } = await github.rest.search.issuesAndPullRequests({
              q: `repo:${context.repo.owner}/${context.repo.repo} is:issue is:open "${run.head_sha.slice(0,7)}" "${run.name}"`
            });
            if (existing.total_count > 0) {
              core.info(`Existing issue found (#${existing.items[0].number}); skipping create`);
              return;
            }

            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['bug', 'ci', 'needs-triage', 'priority:high']
            });
            core.info(`Filed issue #${issue.number}: ${issue.html_url}`);
