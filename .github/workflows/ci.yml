name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Validate exported requirements.txt is in sync
        env:
          UV_CACHE_DIR: ${{ runner.temp }}/uv-cache
        run: |
          uv export --format requirements.txt --no-hashes --no-emit-project --frozen | diff -u requirements.txt -

      - name: Set up Bun
        # Needed by tests that shell out to bun for the onboarding
        # TypeScript sections (test_cash_flow_section, test_debt_profile_section,
        # test_investment_portfolio_section, test_liquid_assets_section,
        # test_onboarding_summary, test_preferences_section).
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: uv sync --dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run mypy src/

      - name: Tests with coverage
        run: |
          uv run pytest \
            --cov=src \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=80

      - name: Coverage badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: tj-actions/coverage-badge-py@v2
        with:
          output: coverage.svg
